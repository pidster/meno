# Slack app manifest for a Meno instance — Socket Mode (real-time Events API).
#
# Create the app from this manifest at https://api.slack.com/apps → "Create New App"
# → "From an app manifest", then Install to Workspace. That issues a BOT token
# (xoxb-…) — give it to the instance as $SLACK_BOT_TOKEN (never store it in the home).
#
# Socket Mode means meno receives events over an OUTBOUND WebSocket — no public Request
# URL, no inbound ingress. After installing, generate an APP-LEVEL token in Basic
# Information → App-Level Tokens (scope: connections:write) and give it to the instance
# as $SLACK_APP_TOKEN (xapp-…). Set `socket_mode = true` in adapters/slack.toml.
#
# The SlackAdapter also still supports polling (`socket_mode = false`): that path needs
# only the bot token + read scopes — no app-level token. See docs/slack-app.md.

_metadata:
  major_version: 2
  minor_version: 2

display_information:
  name: Meno
  description: A persistent cognitive agent — senses Slack, and (gated, opt-in) posts.
  background_color: "#16161d"

features:
  bot_user:
    display_name: Meno         # Slack DISPLAY name (and so the @mention: @Meno). The agent's
                               # own lowercase identifier lives in meno.toml [instance] handle.
    always_online: true        # show a presence dot whenever the Socket Mode link is up
  app_home:
    home_tab_enabled: true                  # the App Home page — a window into meno's state of mind
    messages_tab_enabled: true              # makes meno appear in the workspace Apps list
    messages_tab_read_only_enabled: false   # allow DMs — users can message meno (I3 DM ingestion)
  assistant_view:                           # the Agent/Assistant pane (I3.5) — meno's dedicated surface
    assistant_description: >-
      A persistent cognitive agent — I sense, remember, and follow my own curiosity.
      Not a chatbot: I answer when I have something earned to say.
    suggested_prompts:                      # defaults; the app also sets these per-thread on open
      - title: "What have you been reflecting on?"
        message: "What have you been reflecting on lately?"
      - title: "What are you curious about?"
        message: "What are you curious about right now?"

oauth_config:
  scopes:
    bot:
      # afferent (sense) — the bot reads only channels it is a MEMBER of:
      - channels:read        # users.conversations — list public channels the bot joined
      - groups:read          # users.conversations — list private channels the bot joined
      - channels:history     # conversations.history — read public-channel messages
      - groups:history       # conversations.history — read private-channel messages
      - app_mentions:read    # receive app_mention events (when someone @meno's)
      - im:read              # identify DM (im) channels — every DM message is 'directed' (I3)
      - im:history           # read DM messages (message.im events)
      - users:read           # resolve a speaker's id -> display name, to reply by NAME (I3)
      - assistant:write      # the assistant pane: suggested prompts, status, thread titles (I3.5)
      # efferent (act) — posting is OFF by default in adapters/slack.toml and gated
      # (scope/rate/dry-run); this scope only makes it POSSIBLE, not automatic:
      - chat:write           # chat.postMessage — post as the bot to channels it joined
      # add `mpim:read`+`mpim:history` + a `message.mpim` event only if you also want it to
      # sense GROUP DMs (1:1-channel detection uses conversations.members, no extra scope).

settings:
  org_deploy_enabled: false
  token_rotation_enabled: false   # single-workspace internal app: a static bot token
  socket_mode_enabled: true       # receive events over an outbound WebSocket (no public URL)
  event_subscriptions:            # the bot events meno's Socket Mode adapter handles
    bot_events:
      - message.channels          # real-time public-channel messages
      - message.groups            # real-time private-channel messages
      - message.im                # DMs to meno — every one is 'directed' (I3)
      - app_mention               # when someone @meno's (app_mentions:read)
      - app_home_opened           # a user opened meno's App Home -> publish its state-of-mind view
      - assistant_thread_started          # a user opened meno's assistant pane -> greet + prompts (I3.5)
      - assistant_thread_context_changed  # they switched channels while the pane is open
